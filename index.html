<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Brick Breaker</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>

<body>
  <main class="app">
    <header class="header">
      <h1 class="title">Brick Breaker</h1>

      <!-- Visible instructions help everyone; aria-describedby makes them available to assistive tech too. -->
      <p id="instructions" class="instructions">
        Controls: Arrow keys or A/D to move. Space = Start/Pause. R = Reset.
        On touch devices: drag your finger on the game area to move the paddle.
      </p>
    </header>

    <!-- HUD (score/time/best/level). Keeping it in real HTML (not drawn in canvas) improves accessibility. -->
    <section class="hud" aria-label="Game information">
      <div class="hud__item"><span class="hud__label">Time</span> <span id="timeValue">--</span></div>
      <div class="hud__item"><span class="hud__label">Score</span> <span id="scoreValue">0</span></div>
      <div class="hud__item"><span class="hud__label">Best</span> <span id="bestValue">0</span></div>
      <div class="hud__item"><span class="hud__label">Combo</span> <span id="comboValue">0</span></div>
      <div class="hud__item"><span class="hud__label">Level</span> <span id="levelValue">1</span></div>
    </section>

    <section class="controls" aria-label="Game controls">
      <button id="btnStart" type="button">Start</button>
      <button id="btnPause" type="button">Pause</button>
      <button id="btnReset" type="button">Reset</button>

      <label class="controls__field">
        <input id="durationInput" type="number"  min="10" max="600" step="10"  placeholder="duration(sec)" />
      </label>
    </section>

    <div class="canvasWrap">
      <canvas
        id="game"
        tabindex="0"
        aria-label="Brick breaker game canvas"
        aria-describedby="instructions status"
      >
      </canvas>
    </div>

    <p id="status" class="status" role="status" aria-live="polite"></p>

    <footer class="footer">
     
    </footer>
  </main>

  <script src="js/game.js"></script>
</body>
</html>
